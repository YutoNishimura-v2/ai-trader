extends: adaptive_v8_extend_tp.yaml

# v11: adds BOS-retest and session_sweep_reclaim to v8's core.
# Hypothesis: more uncorrelated members = more trades on winning
# days = larger monthly upside. The router demotes losers via
# expectancy hysteresis so adding more members doesn't add risk
# linearly.

strategy:
  params:
    members:
      - name: pivot_bounce
        id: pivot_daily
        regimes: [all]
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 2.5
          leg1_weight: 0.5
          cooldown_bars: 30
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 6
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_weekly
        regimes: [all]
        params:
          pivot_period: weekly
          atr_period: 14
          touch_atr_buf: 0.10
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 3.0
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 3
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_4h
        regimes: [all]
        risk_multiplier: 0.50
        params:
          pivot_period: 4h
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 2.0
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london
          use_s2r2: false
          levels: [S1, R1]
          max_trades_per_day: 3
          emit_context_meta: true
      - name: bos_retest_scalper
        id: bos_retest
        regimes: [all]
        risk_multiplier: 0.40
        params:
          swing_lookback: 10
          min_legs: 2
          atr_period: 14
          retest_tolerance_atr: 0.5
          sl_atr_buffer: 0.3
          tp1_rr: 1.0
          tp2_rr: 3.0
          leg1_weight: 0.5
          cooldown_bars: 30
          setup_ttl_bars: 60
          session: london_or_ny
      - name: session_sweep_reclaim
        id: sweep_reclaim
        regimes: [all]
        risk_multiplier: 0.40
        params:
          trade_start_hour: 7
          trade_end_hour: 14
          min_sweep_atr: 0.10
          atr_period: 14
          max_trades_per_day: 2
