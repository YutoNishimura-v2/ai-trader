extends: adaptive_v2.yaml

# v3: same members and risk as v2 but no regime gating (every member
# is eligible in any regime). Hypothesis: the router's value comes
# from EXPECTANCY-based reweighting alone; regime gating is dropping
# trades the prior static config would have taken.

strategy:
  params:
    members:
      - name: pivot_bounce
        id: pivot_daily
        regimes: [all]
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.5
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 4
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_weekly
        regimes: [all]
        params:
          pivot_period: weekly
          atr_period: 14
          touch_atr_buf: 0.10
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 2.5
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 2
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_monthly
        regimes: [all]
        params:
          pivot_period: monthly
          atr_period: 14
          touch_atr_buf: 0.15
          sl_atr_buf: 0.30
          max_sl_atr: 3.0
          tp1_rr: 1.2
          tp2_rr: 2.5
          leg1_weight: 0.5
          cooldown_bars: 120
          session: london
          use_s2r2: true
          max_trades_per_day: 1
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_4h
        regimes: [all]
        params:
          pivot_period: 4h
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.5
          leg1_weight: 0.5
          cooldown_bars: 90
          session: london
          use_s2r2: false
          levels: [S1, R1]
          max_trades_per_day: 2
          emit_context_meta: true
