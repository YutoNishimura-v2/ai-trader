extends: adaptive_v8_extend_tp.yaml

# v19: enable confidence-driven risk amplification. RiskManager
# ceiling 1.30 means the per-signal multiplier ranges
# [floor=0.80, ceiling=1.30] linearly with confidence in [0, 1].
# At base=8%, the worst-case effective is 8 * 1.30 = 10.4% — RIGHT
# at the cap. Tightens kill-switch to 4% so even at full size a
# single SL hit doesn't cap.

risk:
  risk_per_trade_pct: 8.0
  max_risk_per_trade_pct: 10.4
  min_risk_per_trade_pct: 1.0
  daily_max_loss_pct: 4.0
  max_concurrent_positions: 1
  confidence_risk_floor: 0.80
  confidence_risk_ceiling: 1.30
