extends: adaptive_v4.yaml

# v5: aggressive sizing + intra-day pyramiding via concurrency=2.
# Bigger per-trade risk lets the router compound more aggressively
# inside winning months. Guard rails kept: dynamic risk on; daily
# max loss raised but still finite; lot cap loosened modestly.

risk:
  risk_per_trade_pct: 12.0
  daily_profit_target_pct: 50.0
  daily_max_loss_pct: 5.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000030
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.5
  max_risk_per_trade_pct: 12.0
  confidence_risk_floor: 1.0
  confidence_risk_ceiling: 1.0
  drawdown_soft_limit_pct: 8.0
  drawdown_hard_limit_pct: 16.0
  drawdown_soft_multiplier: 0.6
  drawdown_hard_multiplier: 0.3

strategy:
  params:
    members:
      - name: pivot_bounce
        id: pivot_daily
        regimes: [all]
        risk_multiplier: 1.0
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.5
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 4
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_weekly
        regimes: [all]
        risk_multiplier: 1.0
        params:
          pivot_period: weekly
          atr_period: 14
          touch_atr_buf: 0.10
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 2.5
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 2
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_monthly
        regimes: [all]
        risk_multiplier: 1.0
        params:
          pivot_period: monthly
          atr_period: 14
          touch_atr_buf: 0.15
          sl_atr_buf: 0.30
          max_sl_atr: 3.0
          tp1_rr: 1.2
          tp2_rr: 2.5
          leg1_weight: 0.5
          cooldown_bars: 120
          session: london
          use_s2r2: true
          max_trades_per_day: 1
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_4h
        regimes: [all]
        risk_multiplier: 0.50
        params:
          pivot_period: 4h
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.5
          leg1_weight: 0.5
          cooldown_bars: 90
          session: london
          use_s2r2: false
          levels: [S1, R1]
          max_trades_per_day: 2
          emit_context_meta: true
