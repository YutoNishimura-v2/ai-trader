extends: adaptive_v43_v36_loose_dd.yaml

# v44: v43b + daily tp2_rr 1.5 -> 2.0. Tries to balance: longer
# runner on daily but not too long. Let see if this lifts Jan
# without losing 4/4 wins.

strategy:
