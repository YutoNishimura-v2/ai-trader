extends: ../default.yaml

# v17: 4h pivot solo at full risk. 4h fires more often than daily,
# so monthly upside potential is higher even though hit rate is
# lower. Combined with the router's hysteresis, losing streaks
# trigger the loss_streak_pause.

instrument: {symbol: XAUUSD, timeframe: M1, contract_size: 100, tick_size: 0.01, tick_value: 1.0, quote_currency: USD}

risk:
  risk_per_trade_pct: 10.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 4.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000020
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.0
  max_risk_per_trade_pct: 10.0
  confidence_risk_floor: 1.0
  confidence_risk_ceiling: 1.0
  drawdown_soft_limit_pct: 12.0
  drawdown_hard_limit_pct: 22.0
  drawdown_soft_multiplier: 0.7
  drawdown_hard_multiplier: 0.4

strategy:
  __replace__: true
  name: adaptive_router
  params:
    __replace__: true
    htf: M15
    adx_period: 14
    range_adx_max: 20.0
    trend_adx_min: 25.0
    expectancy_window: 20
    expectancy_decay_halflife: 7.0
    eligibility_on_threshold: 0.10
    eligibility_off_threshold: -0.10
    probe_risk_multiplier: 0.30
    active_risk_multiplier_floor: 0.50
    active_risk_multiplier_cap: 1.00
    initial_state: active
    priority_mode: expectancy
    intra_day_loss_streak_pause: 3
    members:
      - name: pivot_bounce
        id: pivot_4h_s1r1
        regimes: [all]
        params:
          pivot_period: 4h
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 2.0
          leg1_weight: 0.5
          cooldown_bars: 30
          session: london_or_ny
          use_s2r2: false
          levels: [S1, R1]
          max_trades_per_day: 6
          emit_context_meta: true
      - name: pivot_bounce
        id: pivot_4h_s2r2
        regimes: [all]
        params:
          pivot_period: 4h
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 2.0
          leg1_weight: 0.5
          cooldown_bars: 30
          session: london_or_ny
          use_s2r2: true
          levels: [S2, R2]
          max_trades_per_day: 4
          emit_context_meta: true
