extends: default.yaml

# AsianBreakout standalone config - the trend-day complement to
# session_sweep_reclaim. Designed to fire when M15 trend is strong
# AND aligned with the breakout direction; meant to HEDGE the
# Jan/Mar trend-month drag in ensemble_ultimate.

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

execution:
  spread_points: 12
  slippage_points: 2
  commission_per_lot: 0.0

risk:
  risk_per_trade_pct: 2.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000003

strategy:
  __replace__: true
  name: asian_breakout
  params:
    range_start_hour: 0
    range_end_hour: 6
    trade_start_hour: 7
    trade_end_hour: 14
    atr_period: 14
    min_range_atr: 0.6
    break_atr: 0.20
    sl_atr_buffer: 0.30
    max_sl_atr: 2.0
    tp1_rr: 1.0
    tp2_rr: 2.0
    tp2_range_extension: 0.5
    leg1_weight: 0.5
    max_trades_per_day: 2
    htf: M15
    htf_ema_fast: 20
    htf_ema_slow: 50
    htf_adx_period: 14
    min_trend_adx: 22.0
    cooldown_bars: 5
