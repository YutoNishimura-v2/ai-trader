extends: bos_retest_scalper.yaml

risk:
  risk_per_trade_pct: 3.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 2
  # Aggressive research mode: loosen the ¥100k -> 0.1 lot cap so
  # 2-4% risk sizing can actually express itself in simulation.
  # Keep baseline config for live-feasible comparisons.
  lot_cap_per_unit_balance: 0.000003

strategy:
  params:
    tp1_rr: 0.6
    tp2_rr: 3.0
    leg1_weight: 0.5
    cooldown_bars: 4
