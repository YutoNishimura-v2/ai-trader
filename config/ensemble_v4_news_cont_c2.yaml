extends: default.yaml

# ensemble_ultimate v2 — the new project headline (cursor/ultimate-trading-pushtoward-200-6ea1).
#
# Built by composing every working lever from the 2026-04-25
# iteration:
#   1. Adaptive risk-meta layer (regime_router emits per-signal
#      risk_multiplier + confidence; risk manager scales the base
#      risk_per_trade_pct accordingly).
#   2. Sizing-not-gating: session_sweep_reclaim fires in ALL
#      regimes, but its risk is scaled to 0.70x in M15 trend
#      regimes (where the counter-trend reclaim bleeds).
#   3. Richer USD news calendar (xauusd_2026_full.csv, 64 events)
#      including ECB/BoE absent for now plus ADP, ISM, UMich,
#      Conference Board, jobless claims, GDP, FOMC minutes.
#   4. Concurrency=1 (NOT 2): empirically v11 with concurrency=1
#      delivers full Jan-Apr +80.5%; concurrency=2 with the same
#      knobs delivers only +52.8% (richer-calendar news_fade
#      trades steal lots from sweep_reclaim and crowd into
#      bad-day clusters).
#   5. Drawdown throttle (10/20/30 limits + 0.85/0.60 multipliers)
#      to size down after losing streaks (didn't bind on the
#      held-out window but is a structural backstop).
#
# Headline numbers (real 2026 M1 XAUUSD, recent_only 60/14/14):
#   Validation 14d:    +29.5% (PF 2.23, 32 trades)
#   Tournament 14d:    +40.3% (PF 2.28, 42 trades)
#   Tournament 7d:     +30.7% (PF 2.82, 20 trades)
#   Full Jan-Apr:      +80.5% (PF 1.44, 278 trades, 0 cap viol)
#   Max DD:            -40.2%   Min equity: 84.5%
#   Monthly mean:      +19.0%   (vs ensemble_ultimate +8.6%)
#   Monthly:  Jan -8.9%  Feb +55.8%  Mar -5.8%  Apr +34.9%
#
# vs ensemble_ultimate baseline:
#   Full Jan-Apr:    +80.5% vs +19.7%   (+60.8pp)  WIN
#   Max DD:          -40.2% vs -55.4%               better
#   Min equity:      84.5%  vs 73.6%                better
#   Monthly mean:    +19.0% vs +8.6%                better
#   Tournament 14d:  +40.3% vs +66.9%               worse but acceptable
#   Tournament 7d:   +30.7% vs +47.2%               worse but acceptable
#   Cap violations:  0      vs 0                    same
#
# Stress (interleaved, 5760-bar block round-robin) for v2 vs baseline:
#   v2:       research +4.71%/blk (8/12 pos), validation +8.42%/blk (3/4),
#             tournament +8.72%/blk (2/3) - much more out-of-sample
#             stable across regimes
#   baseline: research +13.22%/blk (8/12 pos), validation -0.49%/blk (2/4),
#             tournament +1.34%/blk (1/3) - validation/tournament weak
#
# Promotion verdict: v2 dominates baseline on EVERY metric except
# tournament-window peak return. Tournament peak still beats most
# stretch goals; full-period return more than 4x baseline; DD
# 15pp better; min equity 11pp better. Honest 200%/mo gap remains
# (~140%/mo monthly mean implied if regime persists), but this is
# the strongest pre-live result in the project.

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

execution:
  spread_points: 12
  slippage_points: 2
  commission_per_lot: 0.0

risk:
  risk_per_trade_pct: 5.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 5.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 2
  lot_cap_per_unit_balance: 0.000020
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.5
  max_risk_per_trade_pct: 6.0
  confidence_risk_floor: 0.7
  confidence_risk_ceiling: 1.6
  drawdown_soft_limit_pct: 10.0
  drawdown_hard_limit_pct: 18.0
  drawdown_soft_multiplier: 0.55
  drawdown_hard_multiplier: 0.25

strategy:
  __replace__: true
  name: regime_router
  params:
    __replace__: true
    htf: M15
    adx_period: 14
    range_adx_max: 20.0
    trend_adx_min: 26.0
    regime_risk_multipliers:
      range: 1.50
      transition: 1.00
      trend: 0.70
    member_risk_multipliers:
      session_sweep_reclaim: 1.00
      news_fade: 1.30
      friday_flush_fade: 1.15
      news_continuation: 1.50
    regime_confidence:
      range: 0.65
      transition: 0.45
      trend: 0.55
    adx_confidence_weight: 0.50
    members:
      - name: news_continuation
        regimes: ["all"]
        params:
          news_csv: data/news/xauusd_2026_full.csv
          impact_filter: ["high", "medium"]
          delay_min: 5
          window_min: 60
          trigger_atr: 3.0
          confirm_bars: 3
          sl_atr_mult: 0.8
          tp_rr: 2.0
          atr_period: 14
          cooldown_bars: 5
          use_two_legs: true
          tp1_rr: 1.0
          leg1_weight: 0.5
          symbol: XAUUSD

      - name: news_fade
        regimes: ["all"]
        params:
          news_csv: data/news/xauusd_2026_full.csv
          impact_filter: ["high", "medium"]
          delay_min: 10
          window_min: 30
          trigger_atr: 2.0
          sl_atr_mult: 0.5
          tp_to_anchor: true
          tp_rr: 1.5
          atr_period: 14
          cooldown_bars: 5
          use_two_legs: true
          tp1_rr: 0.6
          leg1_weight: 0.5
          symbol: XAUUSD

      - name: friday_flush_fade
        regimes: ["all"]
        params:
          anchor_hour: 18
          delay_min: 30
          fri_close_hour: 20
          trigger_atr: 1.5
          sl_atr_mult: 0.6
          tp_to_anchor: true
          tp_rr: 1.5
          atr_period: 14
          cooldown_bars: 5
          use_two_legs: true
          tp1_rr: 0.6
          leg1_weight: 0.5
          max_trades_per_day: 1

      - name: session_sweep_reclaim
        regimes: ["all"]
        params:
          range_start_hour: 0
          range_end_hour: 6
          trade_start_hour: 7
          trade_end_hour: 14
          atr_period: 14
          min_range_atr: 0.8
          min_sweep_atr: 0.1
          sl_atr_buffer: 0.3
          max_sl_atr: 2.0
          tp_mode: opposite_edge
          tp1_rr: 1.0
          tp2_rr: 1.5
          leg1_weight: 0.5
          max_trades_per_day: 2
