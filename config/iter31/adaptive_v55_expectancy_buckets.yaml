extends: adaptive_v55_expectancy_sizing_b.yaml

# Same as adaptive_v55_expectancy_sizing_b (probe + 0.55–1.0 sizing) with
# causal state buckets so expectancy is tracked per (member × bucket).

strategy:
  params:
    state_buckets_enabled: true
    bucket_persist_tf: M15
    bucket_m15_lookback_bars: 8
    bucket_m15_move_thresh: 0.0008
    bucket_atr_ewm_span: 500
    bucket_vol_low_ratio: 0.88
    bucket_vol_high_ratio: 1.12
