          cooldown_bars: 120
          session: london
          use_s2r2: true
          max_trades_per_day: 1
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
      - name: pivot_bounce
        params:
          pivot_period: 4h
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
