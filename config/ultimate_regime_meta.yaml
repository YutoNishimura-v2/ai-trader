extends: default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

execution:
  spread_points: 12
  slippage_points: 2
  commission_per_lot: 0.0

risk:
  # Base risk; dynamic_risk_* scales this per signal.
  risk_per_trade_pct: 3.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000005
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.0
  max_risk_per_trade_pct: 5.0
  confidence_risk_floor: 0.7
  confidence_risk_ceiling: 1.6
  drawdown_soft_limit_pct: 10.0
  drawdown_hard_limit_pct: 20.0
  drawdown_soft_multiplier: 0.70
  drawdown_hard_multiplier: 0.45

strategy:
  __replace__: true
  name: regime_router
  params:
    __replace__: true
    htf: M15
    adx_period: 14
    range_adx_max: 20.0
    trend_adx_min: 26.0
    regime_risk_multipliers:
      range: 1.15
      transition: 0.75
      trend: 1.20
    member_risk_multipliers:
      session_sweep_reclaim: 1.10
      news_fade: 1.25
    regime_confidence:
      range: 0.62
      transition: 0.40
      trend: 0.68
    adx_confidence_weight: 0.55
    members:
      - name: news_fade
        regimes: ["all"]
        params:
          news_csv: data/news/xauusd_2026_rich.csv
          impact_filter: ["high"]
          delay_min: 10
          window_min: 30
          trigger_atr: 2.0
          sl_atr_mult: 0.5
          tp_to_anchor: true
          tp_rr: 1.5
          atr_period: 14
          cooldown_bars: 5
          use_two_legs: true
          tp1_rr: 0.6
          leg1_weight: 0.5
          symbol: XAUUSD

      - name: session_sweep_reclaim
        regimes: ["range", "transition"]
        params:
          range_start_hour: 0
          range_end_hour: 6
          trade_start_hour: 7
          trade_end_hour: 12
          atr_period: 14
          min_range_atr: 0.8
          min_sweep_atr: 0.1
          sl_atr_buffer: 0.3
          max_sl_atr: 2.0
          tp_mode: opposite_edge
          tp1_rr: 1.0
          tp2_rr: 1.5
          leg1_weight: 0.5
          max_trades_per_day: 1
