extends: vwap_reversion.yaml

risk:
  risk_per_trade_pct: 3.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 2
  # Aggressive research mode: keep leverage / daily envelope, but
  # relax the plan-v3 lot cap so 2-4% risk experiments are not
  # silently throttled to the old 0.1-lot ceiling.
  lot_cap_per_unit_balance: 0.000003

strategy:
  params:
    use_two_legs: true
    tp1_rr: 0.6
    leg1_weight: 0.5
