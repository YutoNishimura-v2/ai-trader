extends: ../default.yaml
instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD
risk:
  risk_per_trade_pct: 5.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 5.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000010
strategy:
  __replace__: true
  name: turn_of_month
  params:
    before_days: 3
    after_days: 2
    atr_period: 14
    sl_atr_buf: 0.5
    max_sl_atr: 3.0
    tp_rr: 2.0
    cooldown_bars: 60
    max_trades_per_day: 2
    htf: M15
    htf_fast_ema: 20
    htf_slow_ema: 50
    session: london_or_ny
