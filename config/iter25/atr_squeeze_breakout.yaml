    atr_period: 14
    squeeze_lookback: 100
    squeeze_pct: 25.0
    range_lookback: 20
    sl_atr_buf: 0.30
    max_sl_atr: 2.5
    tp_rr: 2.5
    cooldown_bars: 30
    max_trades_per_day: 3
    htf: M15
    session: london_or_ny
