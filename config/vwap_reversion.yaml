extends: default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

execution:
  spread_points: 12
  slippage_points: 2
  commission_per_lot: 0.0

risk:
  risk_per_trade_pct: 1.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000001

strategy:
  __replace__: true
  name: vwap_reversion
  params:
    __replace__: true
    dev_mult: 2.0
    warmup_bars: 30
    sl_atr_mult: 0.5
    tp_target: vwap
    tp_rr: 1.0
    require_rejection: true
    atr_period: 14
    cooldown_bars: 3
    use_two_legs: true
    tp1_rr: 0.6
    leg1_weight: 0.5
    htf_filter: H1
    htf_ema_fast: 20
    htf_ema_slow: 50
    session: always
