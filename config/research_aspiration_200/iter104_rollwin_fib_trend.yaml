extends: adaptive_dual_pivot_chop_moon_r8_tp9_rollwin.yaml

# FALSIFIED (Wave A / iter32): cap=1, 1/4 wins, large negative Mar/Apr vs baseline.

# Iter104 — Thesis: `trend_pullback_fib` replaces `pivot_trend` for slower
# structural trend entries vs fast daily pivot.

risk:
  risk_per_trade_pct: 8.0
  min_risk_per_trade_pct: 2.0
  max_risk_per_trade_pct: 10.0

strategy:
  __replace__: true
  name: adaptive_router
  params:
    __replace__: true
    htf: M15
    adx_period: 14
    range_adx_max: 20.0
    trend_adx_min: 25.0
    initial_state: active
    priority_mode: config
    eligibility_off_threshold: -1000.0
    probe_risk_multiplier: 1.0
    active_risk_multiplier_floor: 1.0
    active_risk_multiplier_cap: 1.0
    members:
      - name: pivot_bounce
        id: pivot_chop
        regimes: [range, transition]
        risk_multiplier: 1.0
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 9.0
          leg1_weight: 0.45
          cooldown_bars: 45
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 5
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
          htf: M15
          adx_period: 14
          adx_max: 28.0
          block_hours_utc: [13, 14]
      - name: trend_pullback_fib
        id: fib_trend
        regimes: [trend]
        risk_multiplier: 0.55
        params:
          swing_lookback: 22
          min_trend_legs: 2
          fib_entry_min: 0.382
          fib_entry_max: 0.5
          sl_atr_mult: 1.45
          tp_rr: 2.0
          atr_period: 14
          cooldown_bars: 10
          use_two_legs: true
          tp1_rr: 1.0
          leg1_weight: 0.5
