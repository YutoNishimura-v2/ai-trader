extends: adaptive_dual_pivot_chop_moon_r8_tp9_rollwin.yaml

# Iter42 — Mar/Apr uplift experiment (2026 M1 sample, 8% risk stack).
# Widen chop ``block_hours_utc`` to [13,14,15] vs baseline [13,14].
#
# Quick sweep vs rollwin: Mar ~+3.4%, Apr ~+4.4%, full ~+153%, cap=0 — but
# rolling worst_score materially worse (~4.2 vs ~0.1). Keep as alternative
# when optimizing difficult months over cross-window robustness.

strategy:
  params:
    members:
      - name: pivot_bounce
        id: pivot_chop
        regimes: [range, transition]
        risk_multiplier: 1.0
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 9.0
          leg1_weight: 0.45
          cooldown_bars: 45
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 5
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
          htf: M15
          adx_period: 14
          adx_max: 28.0
          block_hours_utc: [13, 14, 15]
      - name: pivot_bounce
        id: pivot_trend
        regimes: [trend]
        risk_multiplier: 0.6
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.6
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 2
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
