extends: adaptive_dual_pivot_chop_moon_r8_tp9_rollwin.yaml

# FALSIFIED (Iter61): `iter32_compare` on data/xauusd_m1_2026.csv — cap=1,
# Mar ~-0.15%, Apr ~-16.9%, 1/4 rolling wins, worst_score ~1.91 vs rollwin
# baseline cap=0, Mar ~+0.83%, Apr ~+1.28%, 2/4, worst_score ~0.10.

# Iter61 — CREATIVE MULTI-METHOD (simulation probe).
# External framing: London open after Asian range + liquidity sweeps are
# commonly described as session/flow edges on XAUUSD (e.g. London-breakout
# playbooks); turn-of-month captures calendar rebalancing windows.
# Stack: calendar/session edges first (YAML order, priority_mode=config),
# then the proven dual-pivot chop/trend core from Iter40 rollwin.
#
# Falsifiable: if caps blow or Mar/Apr do not lift vs dual-pivot alone,
# demote or remove members.

risk:
  risk_per_trade_pct: 8.0
  min_risk_per_trade_pct: 2.0
  max_risk_per_trade_pct: 10.0

strategy:
  __replace__: true
  name: adaptive_router
  params:
    __replace__: true
    htf: M15
    adx_period: 14
    range_adx_max: 20.0
    trend_adx_min: 25.0
    initial_state: active
    priority_mode: config
    eligibility_off_threshold: -1000.0
    probe_risk_multiplier: 1.0
    active_risk_multiplier_floor: 1.0
    active_risk_multiplier_cap: 1.0
    members:
      - name: turn_of_month
        id: tom_overlap
        regimes: [all]
        risk_multiplier: 0.45
        params:
          before_days: 3
          after_days: 2
          tp_rr: 2.0
          max_trades_per_day: 2
          cooldown_bars: 45
          session: overlap
          htf: M15
      - name: london_orb
        id: lon_orb_tr
        regimes: [transition]
        risk_multiplier: 0.55
        params:
          window_min: 150
          min_range_atr: 1.35
          min_break_atr: 0.22
          retest_tolerance_atr: 0.65
          tp1_rr: 1.0
          tp2_rr: 2.2
          leg1_weight: 0.5
          max_sl_atr: 4.0
          max_trades_per_day: 1
      - name: liquidity_sweep
        id: liq_tr_overlap
        regimes: [transition]
        risk_multiplier: 0.4
        params:
          swing_window: 28
          min_sweep_atr: 0.32
          tp1_rr: 1.0
          tp2_rr: 2.3
          leg1_weight: 0.5
          cooldown_bars: 6
          session: overlap
      - name: pivot_bounce
        id: pivot_chop
        regimes: [range, transition]
        risk_multiplier: 1.0
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 9.0
          leg1_weight: 0.45
          cooldown_bars: 45
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 5
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
          htf: M15
          adx_period: 14
          adx_max: 28.0
          block_hours_utc: [13, 14]
      - name: pivot_bounce
        id: pivot_trend
        regimes: [trend]
        risk_multiplier: 0.6
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.6
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 2
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
