extends: _base_moonshot_m1.yaml

# FALSIFIED (2026 M1): cap_violations on full run, 0/4 rolling windows;
# sweep front-runners starve the dual-pivot stack. Do not promote.

# Iter41 attempt — ensemble: London session sweep/reclaim FIRST, then the
# same adaptive_router dual-pivot stack as adaptive_dual_pivot_chop_moon_r8_tp9_rollwin.
# If sweep fires often it may starve pivots (negative control experiment).

risk:
  risk_per_trade_pct: 8.0
  lot_cap_per_unit_balance: 0.00002
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 2.0
  max_risk_per_trade_pct: 10.0
  confidence_risk_floor: 0.9
  confidence_risk_ceiling: 1.1

strategy:
  __replace__: true
  name: ensemble
  params:
    __replace__: true
    members:
      - name: session_sweep_reclaim
        params:
          range_start_hour: 0
          range_end_hour: 6
          trade_start_hour: 7
          trade_end_hour: 12
          min_range_atr: 0.6
          min_sweep_atr: 0.1
          sl_atr_buffer: 0.28
          max_sl_atr: 2.2
          atr_period: 14
          tp_mode: opposite_edge
          tp1_rr: 0.55
          tp2_rr: 3.0
          leg1_weight: 0.45
          max_trades_per_day: 2
      - name: adaptive_router
        params:
          htf: M15
          adx_period: 14
          range_adx_max: 20.0
          trend_adx_min: 25.0
          initial_state: active
          priority_mode: config
          eligibility_off_threshold: -1000.0
          probe_risk_multiplier: 1.0
          active_risk_multiplier_floor: 1.0
          active_risk_multiplier_cap: 1.0
          members:
            - name: pivot_bounce
              id: pivot_chop
              regimes: [range, transition]
              risk_multiplier: 1.0
              params:
                pivot_period: daily
                atr_period: 14
                touch_atr_buf: 0.05
                sl_atr_buf: 0.28
                max_sl_atr: 2.0
                tp1_rr: 1.0
                tp2_rr: 9.0
                leg1_weight: 0.45
                cooldown_bars: 45
                session: london_or_ny
                use_s2r2: true
                max_trades_per_day: 5
                weekdays: [0, 1, 2, 3]
                emit_context_meta: true
                htf: M15
                adx_period: 14
                adx_max: 28.0
                block_hours_utc: [13, 14]
            - name: pivot_bounce
              id: pivot_trend
              regimes: [trend]
              risk_multiplier: 0.6
              params:
                pivot_period: daily
                atr_period: 14
                touch_atr_buf: 0.05
                sl_atr_buf: 0.30
                max_sl_atr: 2.0
                tp1_rr: 1.0
                tp2_rr: 1.6
                leg1_weight: 0.5
                cooldown_bars: 60
                session: london_or_ny
                use_s2r2: true
                max_trades_per_day: 2
                weekdays: [0, 1, 2, 3]
                emit_context_meta: true
