extends: _base_moonshot_m1.yaml

# Simulation-only: lone daily pivot_bounce (S2/R2), Mon–Thu, London/NY,
# 10%/trade. Tests whether stripping the multi-pivot stack and cranking risk
# can approach monthly aspiration on favorable months.

risk:
  risk_per_trade_pct: 10.0
  lot_cap_per_unit_balance: 0.00002

strategy:
  __replace__: true
  name: pivot_bounce
  params:
    __replace__: true
    pivot_period: daily
    atr_period: 14
    touch_atr_buf: 0.05
    sl_atr_buf: 0.28
    max_sl_atr: 2.0
    tp1_rr: 1.0
    tp2_rr: 2.2
    leg1_weight: 0.45
    cooldown_bars: 45
    session: london_or_ny
    use_s2r2: true
    max_trades_per_day: 6
    weekdays: [0, 1, 2, 3]
    emit_context_meta: true
