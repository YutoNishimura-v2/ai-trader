extends: adaptive_dual_pivot_chop_moon_r8_tp9_rollwin.yaml

# Iter44 — Mar/Apr priority: **7%/trade** + chop UTC block **[13,14,15]** (vs [13,14]).
# On data/xauusd_m1_2026.csv vs rollwin baseline: Mar ~+1.83%, Apr ~+3.92%,
# **min(Mar,Apr) ~+1.83** (vs ~+0.83 at 8%), cap=0, harness **2/4** wins,
# **worst_score ~0.67** (vs ~0.10 baseline; vs ~4.16 at 8% + same block alone).

risk:
  risk_per_trade_pct: 7.0
  min_risk_per_trade_pct: 1.75
  max_risk_per_trade_pct: 9.0

strategy:
  params:
    members:
      - name: pivot_bounce
        id: pivot_chop
        regimes: [range, transition]
        risk_multiplier: 1.0
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.28
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 9.0
          leg1_weight: 0.45
          cooldown_bars: 45
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 5
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
          htf: M15
          adx_period: 14
          adx_max: 28.0
          block_hours_utc: [13, 14, 15]
      - name: pivot_bounce
        id: pivot_trend
        regimes: [trend]
        risk_multiplier: 0.6
        params:
          pivot_period: daily
          atr_period: 14
          touch_atr_buf: 0.05
          sl_atr_buf: 0.30
          max_sl_atr: 2.0
          tp1_rr: 1.0
          tp2_rr: 1.6
          leg1_weight: 0.5
          cooldown_bars: 60
          session: london_or_ny
          use_s2r2: true
          max_trades_per_day: 2
          weekdays: [0, 1, 2, 3]
          emit_context_meta: true
