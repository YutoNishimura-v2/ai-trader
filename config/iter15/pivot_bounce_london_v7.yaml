extends: ../default.yaml

# iter15 v7: pivot_bounce_london_v4 + light DD throttle.
# Risk x kill x DD-throttle 9-pt sweep on top of v4 produced this winner:
#   soft=12, mult=0.7 → full +60.48% (¥+60,480)
# Improves on v4 (+53.90%) by ~6.5pp through milder throttle that
# only kicks in at sustained -12% drawdown.

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

risk:
  risk_per_trade_pct: 5.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 5.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000005
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.0
  max_risk_per_trade_pct: 5.0
  confidence_risk_floor: 1.0
  confidence_risk_ceiling: 1.0
  drawdown_soft_limit_pct: 12.0
  drawdown_hard_limit_pct: 22.0
  drawdown_soft_multiplier: 0.7
  drawdown_hard_multiplier: 0.4

strategy:
  __replace__: true
  name: pivot_bounce
  params:
    __replace__: true
    atr_period: 14
    touch_atr_buf: 0.05
    sl_atr_buf: 0.20
    max_sl_atr: 2.0
    tp1_rr: 1.0
    tp2_rr: 1.5
    leg1_weight: 0.5
    cooldown_bars: 30
    session: london
    use_s2r2: true
    max_trades_per_day: 4
