extends: ../default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

strategy:
  __replace__: true
  name: friday_flush_fade
  params:
    __replace__: true
    anchor_hour: 18
    delay_min: 30
    fri_close_hour: 20
    trigger_atr: 1.5
    sl_atr_mult: 0.6
