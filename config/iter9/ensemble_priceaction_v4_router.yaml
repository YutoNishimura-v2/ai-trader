extends: ../default.yaml

# iter9 ensemble v4: regime_router with member-level risk multipliers.
# session_sweep_reclaim has the strongest validation (val PF 1.71); boost it.
# bos_retest_scalper is weak; size it down.
# friday_flush_fade is calendar-driven; baseline weight.

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

risk:
  risk_per_trade_pct: 1.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 2
  lot_cap_per_unit_balance: 0.000001
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 0.5
  max_risk_per_trade_pct: 3.0
  confidence_risk_floor: 0.7
  confidence_risk_ceiling: 1.3
  drawdown_soft_limit_pct: 12.0
  drawdown_hard_limit_pct: 22.0
  drawdown_soft_multiplier: 0.7
  drawdown_hard_multiplier: 0.4

strategy:
  __replace__: true
  name: regime_router
  params:
    __replace__: true
    htf: M15
    adx_period: 14
    range_adx_max: 22.0
    trend_adx_min: 28.0
    regime_risk_multipliers:
      range: 1.30          # boost in chop where sweep_reclaim shines
      transition: 1.00
      trend: 0.70          # cut in trend where sweep_reclaim bleeds
    member_risk_multipliers:
      session_sweep_reclaim: 2.5    # 1.0% base * 2.5 = 2.5% effective on sweep
      bos_retest_scalper: 1.0
      friday_flush_fade: 1.5
    regime_confidence:
      range: 0.65
      transition: 0.45
      trend: 0.55
    adx_confidence_weight: 0.40
    members:
      - name: session_sweep_reclaim
        regimes: ["all"]
        params:
          range_start_hour: 0
          range_end_hour: 6
          trade_start_hour: 7
          trade_end_hour: 16
          min_range_atr: 0.8
          min_sweep_atr: 0.2
          sl_atr_buffer: 0.3
          max_sl_atr: 2.0
          atr_period: 14
          tp_mode: opposite_edge
          tp1_rr: 0.6
          tp2_rr: 2.5
          leg1_weight: 0.5
          max_trades_per_day: 2
      - name: bos_retest_scalper
        regimes: ["range", "transition"]
        params:
          swing_lookback: 10
          min_legs: 2
          atr_period: 14
          retest_tolerance_atr: 0.5
          sl_atr_buffer: 0.3
          tp1_rr: 1.0
          tp2_rr: 3.0
          leg1_weight: 0.5
          cooldown_bars: 5
          setup_ttl_bars: 60
          session: london_or_ny
      - name: friday_flush_fade
        regimes: ["all"]
        params:
          anchor_hour: 18
          delay_min: 30
          fri_close_hour: 20
          trigger_atr: 1.5
          sl_atr_mult: 0.6
          tp_to_anchor: true
          tp_rr: 1.5
          atr_period: 14
          cooldown_bars: 5
          use_two_legs: true
          tp1_rr: 0.6
          leg1_weight: 0.5
          max_trades_per_day: 1
