extends: ../default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

strategy:
  __replace__: true
  name: vwap_reversion
  params:
    __replace__: true
    dev_mult: 2.0
    warmup_bars: 30
    sl_atr_mult: 0.5
    tp_target: vwap
    tp_rr: 1.0
    require_rejection: true
    atr_period: 14
    cooldown_bars: 3
    use_two_legs: true
    tp1_rr: 0.6
    leg1_weight: 0.5
    htf_filter: H1
    htf_ema_fast: 20
    htf_ema_slow: 50
    session: always
