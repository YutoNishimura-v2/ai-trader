extends: ../default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

strategy:
  __replace__: true
  name: mtf_zigzag_bos
  params:
    __replace__: true
    htf: M5
    zigzag_threshold_atr: 1.5
    zigzag_atr_period: 14
    atr_period_m1: 14
    retest_tolerance_atr: 0.5
    sl_atr_buffer: 0.3
    tp1_rr: 1.0
    tp2_rr: 3.0
    leg1_weight: 0.5
    cooldown_bars: 5
    setup_ttl_bars: 60
    session: always
