extends: ../default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

strategy:
  __replace__: true
  name: session_sweep_reclaim
  params:
    __replace__: true
    range_start_hour: 0
    range_end_hour: 6
    trade_start_hour: 7
    trade_end_hour: 16
    min_range_atr: 0.8
    min_sweep_atr: 0.2
    sl_atr_buffer: 0.3
    max_sl_atr: 2.0
    atr_period: 14
    tp_mode: opposite_edge
    tp1_rr: 0.6
    tp2_rr: 2.5
    leg1_weight: 0.5
    max_trades_per_day: 1
