extends: ../../default.yaml
instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD
risk:
  risk_per_trade_pct: 7.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 3.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000020
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.0
  max_risk_per_trade_pct: 7.0
  drawdown_soft_limit_pct: 12.0
  drawdown_hard_limit_pct: 22.0
  drawdown_soft_multiplier: 0.7
  drawdown_hard_multiplier: 0.4
strategy:
  __replace__: true
  name: pivot_bounce
  params:
    pivot_period: monthly
    atr_period: 14
    touch_atr_buf: 0.15
    sl_atr_buf: 0.30
    max_sl_atr: 3.0
    tp1_rr: 1.2
    tp2_rr: 2.5
    leg1_weight: 0.5
    cooldown_bars: 120
    session: london_or_ny
    use_s2r2: true
    max_trades_per_day: 1

