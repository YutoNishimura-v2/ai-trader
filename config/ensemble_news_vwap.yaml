extends: default.yaml

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

execution:
  spread_points: 12
  slippage_points: 2
  commission_per_lot: 0.0

risk:
  risk_per_trade_pct: 1.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 10.0
  withdraw_half_of_daily_profit: true
  max_concurrent_positions: 2
  lot_cap_per_unit_balance: 0.000001

strategy:
  __replace__: true
  name: ensemble
  params:
    __replace__: true
    members:
      # Priority 1: news_fade (rare, high-edge, clean DD).
      - name: news_fade
        params:
          news_csv: data/news/xauusd_2026.csv
          impact_filter: ["high"]
          delay_min: 5
          window_min: 60
          trigger_atr: 2.0
          sl_atr_mult: 0.5
          tp_to_anchor: true
          atr_period: 14
          cooldown_bars: 5
          use_two_legs: true
          tp1_rr: 0.6
          leg1_weight: 0.5
          symbol: XAUUSD

      # Priority 2: vwap_reversion (frequent fill).
      - name: vwap_reversion
        params:
          dev_mult: 2.5
          warmup_bars: 30
          sl_atr_mult: 0.5
          tp_target: vwap
          require_rejection: true
          atr_period: 14
          cooldown_bars: 3
          use_two_legs: true
          tp1_rr: 0.6
          leg1_weight: 0.5
          htf_filter: none
          session: always
