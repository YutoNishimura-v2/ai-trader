extends: ../default.yaml

# iter17 v8: pivot_bounce_london_v7 + tighter daily_max_loss (5→3) + cooldown 30→60.
# Sweeps showed:
#   - cooldown 60: full +60.76% vs +57.95% (v7's cd=30); same val
#   - kill=3.0:    full +60.56%, t14 -14.11%, DD -15.54%
#                  vs v7's kill=5.0: full +57.95%, t14 -16.27%, DD -18.48%
# Net: tighter kill HELPS the strategy by gating worst-day disasters.

instrument:
  symbol: XAUUSD
  timeframe: M1
  contract_size: 100
  tick_size: 0.01
  tick_value: 1.0
  quote_currency: USD

risk:
  risk_per_trade_pct: 5.0
  daily_profit_target_pct: 30.0
  daily_max_loss_pct: 3.0
  withdraw_half_of_daily_profit: false
  max_concurrent_positions: 1
  lot_cap_per_unit_balance: 0.000005
  dynamic_risk_enabled: true
  min_risk_per_trade_pct: 1.0
  max_risk_per_trade_pct: 5.0
  confidence_risk_floor: 1.0
  confidence_risk_ceiling: 1.0
  drawdown_soft_limit_pct: 12.0
  drawdown_hard_limit_pct: 22.0
  drawdown_soft_multiplier: 0.7
  drawdown_hard_multiplier: 0.4

strategy:
  __replace__: true
  name: pivot_bounce
  params:
    __replace__: true
    atr_period: 14
    touch_atr_buf: 0.05
    sl_atr_buf: 0.20
    max_sl_atr: 2.0
    tp1_rr: 1.0
    tp2_rr: 1.5
    leg1_weight: 0.5
    cooldown_bars: 60
    session: london
    use_s2r2: true
    max_trades_per_day: 4
